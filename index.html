<style>

const TOTAL_MIN = 175;

const canvas = document.getElementById('cfa-canvas');
const ctx = canvas.getContext('2d');
let W, H, projection;

function resize(){
  const mapArea = document.getElementById('map-area');
  W = mapArea.clientWidth;
  H = mapArea.clientHeight;
  canvas.width = W;
  canvas.height = H;
  projection = d3.geoMercator()
    .scale(Math.min(W, H) * 2.1)
    .center([-54.568, 48.936])
    .translate([W * 0.5, H * 0.52]);
}

window.addEventListener('resize', ()=>{ resize(); drawFrame(animT); });
resize();

function ll(lon, lat){
  try { return projection([lon,lat]); } catch(e){ return null; }
}

function greatCirclePt(o, d, t){
  const r = Math.PI/180, deg = 180/Math.PI;
  const la1=o[1]*r, lo1=o[0]*r, la2=d[1]*r, lo2=d[0]*r;
  const dd = 2*Math.asin(Math.sqrt(
    Math.pow(Math.sin((la2-la1)/2),2)+Math.cos(la1)*Math.cos(la2)*Math.pow(Math.sin((lo2-lo1)/2),2)
  ));
  if(dd < 0.0001) return [o[0]*(1-t)+d[0]*t, o[1]*(1-t)+d[1]*t];
  const A=Math.sin((1-t)*dd)/Math.sin(dd), B=Math.sin(t*dd)/Math.sin(dd);
  const x=A*Math.cos(la1)*Math.cos(lo1)+B*Math.cos(la2)*Math.cos(lo2);
  const y=A*Math.cos(la1)*Math.sin(lo1)+B*Math.cos(la2)*Math.sin(lo2);
  const z=A*Math.sin(la1)+B*Math.sin(la2);
  return [Math.atan2(y,x)*deg, Math.atan2(z,Math.sqrt(x*x+y*y))*deg];
}

let worldData = null;
let animRunning = false;
let animT = 0;
let lastTS = null;
let speed = 20;
let landedIds = new Set();
let divIds = new Set();
let fadeDone = false;

const tickerItems = [
  {text: 'FAA ORDERS NATIONAL GROUND STOP — 09:08 EDT', color: '#7ec8e8'},
  {text: 'CANADIAN AIRSPACE OPEN — OPERATION YELLOW RIBBON INITIATED', color: '#7ec8e8'},
  {text: 'TRANSPORT CANADA DIRECTS 224 AIRCRAFT TO 17 AIRPORTS', color: '#7ec8e8'},
];

const tickerCanvas = document.getElementById('ticker-canvas');
const tCtx = tickerCanvas.getContext('2d');
let tickerX = 0;
let tickerW = 0;
let tickerH = 38;
let tickerLastTS = null;
const TICKER_SPEED = 80;

function resizeTicker(){
  tickerCanvas.width = tickerCanvas.offsetWidth * window.devicePixelRatio;
  tickerCanvas.height = tickerCanvas.offsetHeight * window.devicePixelRatio;
  tickerW = tickerCanvas.width;
  tickerH = tickerCanvas.height;
  tCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  tickerX = tickerCanvas.offsetWidth;
}

function measureTickerContent(){
  const font = `bold ${13 * window.devicePixelRatio}px "Courier New", monospace`;
  tCtx.font = `bold 13px "Courier New", monospace`;
  let total = 0;
  tickerItems.forEach(item => {
    total += tCtx.measureText(item.text).width + 60;
  });
  return total;
}

function drawTicker(){
  const cw = tickerCanvas.offsetWidth;
  const ch = tickerCanvas.offsetHeight;
  tCtx.clearRect(0,0,cw,ch);
  tCtx.fillStyle = '#091830';
  tCtx.fillRect(0,0,cw,ch);

  tCtx.font = `bold 14px "Courier New", monospace`;
  tCtx.textBaseline = 'middle';

  let x = tickerX;
  let totalW = 0;
  tickerItems.forEach(item => {
    const tw = tCtx.measureText(item.text).width;
    tCtx.fillStyle = item.color;
    tCtx.fillText(item.text, x, ch/2);
    tCtx.fillStyle = 'rgba(245,184,0,0.4)';
    tCtx.fillRect(x + tw + 20, ch/2 - 5, 2, 10);
    x += tw + 60;
    totalW += tw + 60;
  });

  return totalW;
}

function tickerLoop(ts){
  if(!tickerLastTS) tickerLastTS = ts;
  const dt = (ts - tickerLastTS) / 1000;
  tickerLastTS = ts;

  const totalW = drawTicker();
  tickerX -= TICKER_SPEED * dt;
  if(tickerX < -totalW){
    tickerX = tickerCanvas.offsetWidth;
  }

  requestAnimationFrame(tickerLoop);
}

function addTickerMessage(text, color){
  tickerItems.push({text, color});
  if(tickerItems.length > 40) tickerItems.shift();
}

window.addEventListener('resize', resizeTicker);

function timeStr(m){
  const base = 8*60+46;
  const total = (base+m) % (24*60);
  const h = Math.floor(total/60), mm = total%60;
  return (h<10?'0':'')+h+':'+(mm<10?'0':'')+mm+' EDT';
}

function getFlightState(f, tMin){
  if(tMin < f.delay) return {phase:'pre'};
  const enDur = f.divMin - f.delay;
  if(tMin < f.divMin){
    return {phase:'en', t:(tMin-f.delay)/enDur};
  }
  const toG = 55 + (FLIGHTS.indexOf(f)%5)*4;
  if(tMin < f.divMin + toG){
    return {phase:'divert', t:(tMin-f.divMin)/toG};
  }
  return {phase:'landed'};
}

function drawMapBase(){
  ctx.save();
  ctx.fillStyle = '#1a3a7a';
  ctx.fillRect(0,0,W,H);

  if(worldData){
    ctx.fillStyle = '#c8a84b';
    ctx.strokeStyle = '#8a6820';
    ctx.lineWidth = 1.2;
    worldData.features.forEach(f=>{
      const path = d3.geoPath().projection(projection).context(ctx);
      ctx.beginPath(); path(f);
      ctx.fill(); ctx.stroke();
    });
  }

  ctx.strokeStyle = 'rgba(126,200,232,0.25)';
  ctx.lineWidth = 0.5;
  const grat = d3.geoGraticule()();
  const gpath = d3.geoPath().projection(projection).context(ctx);
  ctx.beginPath(); gpath(grat); ctx.stroke();
  ctx.restore();
}

function drawGander(){
  const gxy = ll(GANDER[0], GANDER[1]);
  if(!gxy) return;
  const pulse = 0.5+0.5*Math.sin(Date.now()/400);
  ctx.save();
  ctx.beginPath();
  ctx.arc(gxy[0],gxy[1],22+pulse*12,0,Math.PI*2);
  ctx.strokeStyle = `rgba(245,184,0,${0.15+pulse*0.3})`;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(gxy[0],gxy[1],12+pulse*5,0,Math.PI*2);
  ctx.strokeStyle = `rgba(245,184,0,${0.35+pulse*0.4})`;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(gxy[0],gxy[1],7,0,Math.PI*2);
  ctx.fillStyle = '#f5b800';
  ctx.fill();
  ctx.fillStyle = '#f5b800';
  const fs = Math.max(13, Math.round(W*0.018));
  ctx.font = `bold ${fs}px Courier New`;
  ctx.fillText('GANDER (CYQX)', gxy[0]+16, gxy[1]-12);
  ctx.font = `${Math.max(10,Math.round(W*0.013))}px Courier New`;
  ctx.fillStyle = '#7ec8e8';
  ctx.fillText('NEWFOUNDLAND', gxy[0]+16, gxy[1]+6);
  ctx.restore();
}

function drawFrame(tMin){
  ctx.clearRect(0,0,W,H);
  drawMapBase();

  let inFlight=0, landed=0;

  FLIGHTS.forEach(f=>{
    const st = getFlightState(f, tMin);
    if(st.phase==='pre') return;
    if(st.phase==='landed'){ landed++; return; }
    inFlight++;

    const divPt = greatCirclePt(f.o, f.dest, 0.45);

    let pos, trailStart, trailEnd;

    if(st.phase==='en'){
      const t = st.t * 0.45;
      pos = greatCirclePt(f.o, f.dest, t);
      trailStart = f.o;
      trailEnd = pos;
    } else {
      pos = greatCirclePt(divPt, GANDER, st.t);
      trailStart = divPt;
      trailEnd = pos;
    }

    const pxy = ll(pos[0],pos[1]);
    if(!pxy) return;

    // Draw full path from trail start to current position as multi-segment great circle
    const SEGMENTS = 60;
    const startLl = trailStart;
    const endLl = trailEnd;
    ctx.save();
    ctx.beginPath();
    let started = false;
    for(let i=0; i<=SEGMENTS; i++){
      const t = i/SEGMENTS;
      const pt = greatCirclePt(startLl, endLl, t);
      const xy = ll(pt[0], pt[1]);
      if(!xy) { started = false; continue; }
      if(!started){ ctx.moveTo(xy[0],xy[1]); started=true; }
      else ctx.lineTo(xy[0],xy[1]);
    }
    ctx.strokeStyle = f.color + 'cc';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Heading angle from last two trail points
    const prevPt = greatCirclePt(trailStart, trailEnd, 0.97);
    const prevXy = ll(prevPt[0], prevPt[1]);
    const ang = prevXy ? Math.atan2(pxy[1]-prevXy[1], pxy[0]-prevXy[0]) : 0;

    ctx.save();
    ctx.translate(pxy[0],pxy[1]);
    ctx.rotate(ang);
    ctx.fillStyle = f.color;
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 0.4;

    const s = 1.0;

    // fuselage — rounded oval, nose at +x
    ctx.beginPath();
    ctx.moveTo(11*s, 0);
    ctx.bezierCurveTo(11*s, -2.5*s,  6*s, -3*s,  0,     -3*s);
    ctx.bezierCurveTo(-6*s, -3*s,  -11*s, -2*s, -12*s, -1*s);
    ctx.lineTo(-12*s, 1*s);
    ctx.bezierCurveTo(-11*s,  2*s,  -6*s,  3*s,   0,      3*s);
    ctx.bezierCurveTo( 6*s,  3*s,   11*s,  2.5*s, 11*s,   0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // left wing — very thin blade
    ctx.beginPath();
    ctx.moveTo( 3*s,  -2.8*s);   // root leading edge
    ctx.lineTo( 0.5*s,-18*s);    // tip leading edge
    ctx.lineTo(-0.5*s,-18*s);    // tip (almost a point)
    ctx.lineTo(-3*s,  -3.2*s);   // root trailing edge
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // right wing
    ctx.beginPath();
    ctx.moveTo( 3*s,   2.8*s);
    ctx.lineTo( 0.5*s, 18*s);
    ctx.lineTo(-0.5*s, 18*s);
    ctx.lineTo(-3*s,   3.2*s);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // left stabiliser — thin, small
    ctx.beginPath();
    ctx.moveTo(-8.5*s, -1.8*s);
    ctx.lineTo(-9.5*s, -6.5*s);
    ctx.lineTo(-10*s,  -6.5*s);
    ctx.lineTo(-12*s,  -1.2*s);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // right stabiliser
    ctx.beginPath();
    ctx.moveTo(-8.5*s,  1.8*s);
    ctx.lineTo(-9.5*s,  6.5*s);
    ctx.lineTo(-10*s,   6.5*s);
    ctx.lineTo(-12*s,   1.2*s);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.restore();

    if(!divIds.has(f.id) && st.phase==='divert'){
      divIds.add(f.id);
      addTickerMessage(`${f.label} — DIVERTED FROM ${f.from.toUpperCase()} — HEADING GANDER`, '#f5b800');
    }
    if(!landedIds.has(f.id) && st.phase==='landed'){
      landedIds.add(f.id);
      addTickerMessage(`${f.label} — LANDED GANDER CYQX`, '#7ec8e8');
    }
  });

  drawGander();

  document.getElementById('hud-time').textContent = timeStr(tMin);
  document.getElementById('hud-count').textContent =
    `TRACKING: ${inFlight}  |  LANDED: ${landed} / ${FLIGHTS.length}`;

  if(landed >= FLIGHTS.length && !fadeDone){
    fadeDone = true;
    setTimeout(()=>{
      document.getElementById('fade-overlay').classList.add('fading');
      document.getElementById('final-msg').classList.add('visible');
    }, 2000);
  }
}

let rafId = null;

function animate(ts){
  if(!lastTS) lastTS = ts;
  const dt = (ts-lastTS)/1000;
  lastTS = ts;
  animT += dt * speed * (1/60);
  if(animT > TOTAL_MIN) animT = TOTAL_MIN;
  drawFrame(animT);
  if(animT < TOTAL_MIN && animRunning){
    rafId = requestAnimationFrame(animate);
  } else if(animT >= TOTAL_MIN){
    setTimeout(() => {
      animT = 0;
      landedIds.clear();
      divIds.clear();
      fadeDone = false;
      document.getElementById('fade-overlay').classList.remove('fading');
      document.getElementById('final-msg').classList.remove('visible');
      lastTS = null;
      rafId = requestAnimationFrame(animate);
    }, 8000);
  }
}

document.getElementById('btn-play').addEventListener('click',function(){
  if(animRunning){
    animRunning=false; lastTS=null;
    cancelAnimationFrame(rafId);
    this.textContent = '\u25BA PLAY';
  } else {
    if(animT >= TOTAL_MIN){ animT=0; landedIds.clear(); divIds.clear(); fadeDone=false;
      document.getElementById('fade-overlay').classList.remove('fading');
      document.getElementById('final-msg').classList.remove('visible');
    }
    animRunning=true; lastTS=null;
    this.textContent = '\u23F8 PAUSE';
    rafId = requestAnimationFrame(animate);
  }
});

document.getElementById('btn-reset').addEventListener('click',function(){
  animRunning=false; lastTS=null;
  cancelAnimationFrame(rafId);
  animT=0; landedIds.clear(); divIds.clear(); fadeDone=false;
  document.getElementById('fade-overlay').classList.remove('fading');
  document.getElementById('final-msg').classList.remove('visible');
  document.getElementById('btn-play').textContent = '\u25BA PLAY';
  drawFrame(0);
});

document.getElementById('cfa-speed').addEventListener('input',function(){
  speed = parseInt(this.value);
  document.getElementById('spd-val').textContent = speed+'x';
});

document.addEventListener('keydown', e=>{
  if(e.code==='Space'){
    e.preventDefault();
    document.getElementById('btn-play').click();
  }
  if(e.code==='KeyR') document.getElementById('btn-reset').click();
  if(e.code==='KeyF' || e.code==='F11') {
    if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
  }
});

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r=>r.json())
  .then(topo=>{
    worldData = topojson.feature(topo, topo.objects.countries);
    drawFrame(0);
  })
  .catch(()=>{ drawFrame(0); });

drawFrame(0);
resizeTicker();
requestAnimationFrame(tickerLoop);

})();
